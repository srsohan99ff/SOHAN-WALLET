<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>𝐒ᴏʜᴀɴ 𝐏ᴇᴍᴇɴᴛ - Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f2f7;          
            --card: #ffffff;        
            --border: #e5e5ea;      
            --text-dark: #1c1c1e;   
            --text-muted: #8e8e93;  
            --success: #34c759;     
            --danger: #ff3b30;
            --primary: #2481cc;     
            --font: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body { 
            background-color: var(--bg); 
            padding: 16px; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
        }

        .top-nav-bar {
            width: 100%;
            height: 36px;
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .back-circle-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: #fff;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s ease;
        }
        .back-circle-btn svg { width: 14px; height: 14px; fill: #48484a; }

        .brand-header {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
            margin-top: 4px;
        }
        h1.brand-title { 
            font-size: 24px; 
            font-weight: 700; 
            color: #000000; 
            letter-spacing: -0.3px;
        }

        .step-container { width: 100%; }
        @keyframes stepFade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

        .section-label { font-size: 13px; font-weight: 500; color: var(--text-muted); text-align: left; margin-bottom: 8px; padding-left: 2px; }
        
        /* INPUT CARD DROPDOWN STYLE */
        .input-card {
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            position: relative; display: flex; align-items: center; margin-bottom: 20px; overflow: hidden;
        }
        .input-card.custom-disabled {
            opacity: 0.6;
            background: #e5e5ea;
            cursor: not-allowed;
        }

        .custom-select-trigger {
            width: 100%;
            padding: 14px;
            font-size: 14px;
            color: #1c1c1e;
            background: transparent;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .custom-select-trigger.placeholder .trigger-content .item-name {
            color: #bcbcc1;
        }
        .trigger-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: calc(100% - 16px);
            padding-right: 4px;
        }
        .trigger-left-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .arrow-icon {
            width: 10px;
            height: 10px;
            fill: none;
            stroke: #8e8e93;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .crypto-image-logo {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            object-fit: cover;
        }

        /* iOS FULL SCREEN MODAL OVERLAY */
        .ios-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 20000;
            display: none;
            justify-content: center;
        }
        .ios-modal-overlay.show { display: flex; }
        
        .ios-bottom-sheet {
            width: 100%; max-width: 480px; height: 100%;
            display: flex; flex-direction: column;
            padding: 16px;
        }

        .ios-modal-header {
            display: flex; align-items: center;
            height: 40px; margin-bottom: 12px; position: relative;
        }
        .modal-back-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid var(--border); background: #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }
        .modal-back-btn svg { width: 14px; height: 14px; fill: #48484a; }
        
        .ios-modal-title { 
            position: absolute; left: 50%; transform: translateX(-50%);
            font-size: 18px; font-weight: 700; color: #000; 
            white-space: nowrap;
        }

        .ios-search-box { margin-bottom: 14px; }
        .search-input-wrapper {
            width: 100%; background: #ffffff;
            border-radius: 10px; border: 1px solid var(--border); 
            display: flex; align-items: center; padding-left: 12px;
        }
        .premium-search-icon {
            width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .premium-search-icon svg {
            width: 100%; height: 100%; fill: none; stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
        }
        .search-field {
            width: 100%; padding: 12px 10px; border: none; outline: none; font-size: 14.5px; background: transparent; color: #000;
        }
        .search-field::placeholder { color: #bcbcc1; }

        .ios-list-content {
            overflow-y: auto; flex-grow: 1; background: #ffffff; border-radius: 10px; border: 1px solid var(--border);
        }
        .ios-country-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; font-size: 15px; color: #000;
            border-bottom: 1px solid #f2f2f7; cursor: pointer; transition: background 0.1s;
        }
        .ios-country-item:last-child { border-bottom: none; }
        .ios-country-item:active { background: #f2f2f7; }
        .item-name { font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .popular-badge { background: #e3f2fd; color: var(--primary); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; }

        /* PROCEED BUTTON */
        .proceed-btn {
            width: 100%; padding: 14px; background: #d1d1d6; color: #8e8e93; border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
            cursor: not-allowed; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .proceed-btn.active { background: var(--primary) !important; color: #fff !important; cursor: pointer !important; }
        .btn-spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.5s linear infinite; }

        /* SUMMARY CARD */
        .summary-card { 
            background: var(--card); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 20px; width: 100%;
        }
        .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #f2f2f7; }
        .summary-row:last-child { border-bottom: none; }
        .row-label-normal { font-size: 14px; color: #2c2c2e; font-weight: 500; flex-shrink: 0; }
        
        /* COPY COMPONENT */
        .row-value-copy { 
            display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; 
            color: #1c1c1e; flex: 1; justify-content: flex-end; min-width: 0;
        }
        #addrText { word-break: break-all; text-align: right; min-width: 0; font-weight: 400; color: #1c1c1e; }
        
        .inline-copy-btn {
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
            background: #ffffff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; flex-shrink: 0;
        }
        .inline-copy-btn svg { width: 14px; height: 14px; fill: #8e8e93; }
        .inline-copy-btn.copied { background: var(--success) !important; border-color: var(--success) !important; }
        .inline-copy-btn.copied svg { fill: #fff !important; }

        .row-value { font-size: 14px; font-weight: 600; color: #1c1c1e; display: flex; align-items: center; gap: 8px; text-align: right; }

        /* QR DISPLAY BUTTON */
        .qr-toggle-btn {
            width: 100%; padding: 12px; background: #ffffff; color: var(--text-dark); border: 1px solid var(--border); border-radius: 10px; font-size: 13.5px; font-weight: 500;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px;
        }

        /* FULL SCREEN QR CODE OVERLAY */
        #qrFullscreenOverlay {
            display: none; position: fixed; inset: 0; background: var(--bg);
            z-index: 25000; flex-direction: column; align-items: center; justify-content: center;
        }
        .qr-close-btn {
            position: absolute; top: 30px; right: 30px; background: #fff; border: 1px solid var(--border);
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dark);
        }
        .qr-large-image {
            width: 240px; height: 240px; background: #fff; padding: 14px; border-radius: 16px;
            border: 1px solid var(--border);
        }
        .qr-large-image img { width: 100%; height: 100%; object-fit: contain; }
        .qr-instruction { margin-top: 20px; font-size: 15px; font-weight: 500; color: var(--text-muted); }

        /* FLOATING TOAST PILL - ১ লাইনে টিক চিহ্ন সহ সাকসেস মেসেজ */
        #topNotification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(28, 28, 30, 0.94); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 13.5px; font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 30000; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        #topNotification.show { top: 24px; }
        .toast-check { width: 18px; height: 18px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; }
        .toast-check svg { width: 10px; height: 10px; stroke: #fff; fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }

        /* SUPPORT BAR */
        .social-support-container { text-align: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .support-title { font-size: 12.5px; color: var(--text-muted); margin-bottom: 10px; }
        .social-icons-row { display: flex; justify-content: center; gap: 12px; }
        .social-circle-btn {
            width: 36px; height: 36px; border-radius: 50%; background: #fff; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-dark);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- হুবহু ১ লাইনের ফ্লয়েড টিক চিহ্ন টোস্ট নোটিফিকেশন -->
    <div id="topNotification">
        <div class="toast-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        Copied Successfully!
    </div>

    <!-- ফুল-স্ক্রিন কিউআর মডাল -->
    <div id="qrFullscreenOverlay">
        <button class="qr-close-btn" onclick="closeQR()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <div class="qr-large-image">
            <img id="fullscreenQRImage" src="" alt="QR Scanner">
        </div>
        <div class="qr-instruction">Scan this QR Code to Pay</div>
    </div>

    <div class="wrapper">
        <div class="top-nav-bar">
            <button id="backArrowBtn" class="back-circle-btn" onclick="handleBackHome()">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
        </div>

        <div class="brand-header" id="brandHeader">
            <h1 class="brand-title">𝐒ᴏʜᴀɴ 𝐏ᴇᴍᴇɴᴛ</h1>
        </div>

        <!-- সিলেকশন পেজ (স্টেপ ১) -->
        <div id="selectionArea" class="step-container">
            <div class="section-label">Select Currency</div>
            <div class="input-card" id="currencyCard">
                <div class="custom-select-trigger placeholder" id="assetSelected" onclick="openDropdownSheet('currency')">
                    <div class="trigger-content" id="selectedCurrencyText">
                        <span class="item-name">Select Currency</span>
                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>

            <div class="section-label" id="subSelectLabel">Network</div>
            <div class="input-card custom-disabled" id="networkCard">
                <div class="custom-select-trigger placeholder" id="networkSelected" onclick="openDropdownSheet('network')">
                    <div class="trigger-content" id="selectedNetworkText">
                        <span class="item-name" id="networkTextPlaceholder">Select Network</span>
                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>

            <button id="proceedBtn" class="proceed-btn" onclick="startLoadingProcess()" disabled>
                <div id="btnSpinner" class="btn-spinner"></div>
                <span id="btnText">Proceed</span>
            </button>
        </div>

        <!-- ফাইনাল পেমেন্ট সামারি পেজ (স্টেপ ২) -->
        <div id="displayArea" class="step-container" style="display: none;">
            <div class="section-label">Payment Confirmation Summary</div>
            <div class="summary-card">
                <div class="summary-row">
                    <span class="row-label-normal">Method</span>
                    <div class="row-value" id="summaryMethod">-</div>
                </div>
                <div class="summary-row">
                    <span class="row-label-normal" id="summaryIdLabel">Address</span>
                    <div class="row-value-copy">
                        <span id="addrText">LOADING...</span>
                        <button id="copyBtnEl" class="inline-copy-btn" onclick="copyText('addrText')">
                            <svg id="copySvgIcon" viewBox="0 0 24 24">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="summary-row">
                    <span class="row-label-normal" id="summaryTypeLabel">Network</span>
                    <span class="row-value" id="summaryTypeValue" style="color: var(--success);">Personal</span>
                </div>
            </div>

            <div id="qrToggleContainer" style="display: none;">
                <button class="qr-toggle-btn" onclick="openQR()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>Show QR Code Scanner</span>
                </button>
            </div>

            <button class="proceed-btn active" style="background: var(--primary) !important; color: #fff;" onclick="location.reload()">
                <span>Back to Home</span>
            </button>
        </div>

        <!-- সাপোর্ট কন্টাক্ট সেকশন -->
        <div class="social-support-container">
            <div class="support-title">Please contact us if you have any questions</div>
            <div class="social-icons-row">
                <a href="https://t.me/srsohan99ff" target="_blank" class="social-circle-btn">

                </a>
                <a href="https://wa.me/8801329365319" target="_blank" class="social-circle-btn">

                </a>
            </div>
        </div>
    </div>

    <!-- ফুল-স্ক্রিন আইওএস ড্রপডাউন মডাল (কারেন্সি এবং নেটওয়ার্ক ফিল্টার) -->
    <div class="ios-modal-overlay" id="dropdownOverlay">
        <div class="ios-bottom-sheet">
            <div class="ios-modal-header">
                <button class="modal-back-btn" onclick="closeDropdownSheet()">
                    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <span id="sheetTitle" class="ios-modal-title">Select Currency</span>
            </div>
            
            <div class="ios-search-box">
                <div class="search-input-wrapper">
                    <div class="premium-search-icon">
                        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <input type="text" id="sheetSearchInput" class="search-field" placeholder="Search..." oninput="filterDropdownOptions()">
                </div>
            </div>
            
            <div class="ios-list-content" id="sheetOptionsList"></div>
        </div>
    </div>

    <script>
        const logoUrls = {
            bKash: "https://i.ibb.co.com/4g1Xr8BP/1164.jpg",
            Nagad: "https://i.ibb.co.com/ksqxHvm8/image.png",
            USDT: "https://i.ibb.co.com/MDXfJt8R/1153.png",
            LTC: "https://i.ibb.co.com/S7J570W0/1154.png"
        };

        const logos = {
            bKash: `<img src="${logoUrls.bKash}" class="crypto-image-logo" alt="bKash">`,
            Nagad: `<img src="${logoUrls.Nagad}" class="crypto-image-logo" alt="Nagad">`,
            USDT: `<img src="${logoUrls.USDT}" class="crypto-image-logo" alt="USDT">`,
            LTC: `<img src="${logoUrls.LTC}" class="crypto-image-logo" alt="LTC">`
        };
        
        const walletData = {
            bkash: [{ name: "Personal", logoKey: "bKash", address: "01329365319", qr: "https://i.ibb.co.com/4g1Xr8BP/1164.jpg", isPopular: false }],
            nagad: [{ name: "Personal", logoKey: "Nagad", address: "01329365319", qr: "https://i.ibb.co.com/ksqxHvm8/image.png", isPopular: false }],
            usdt: [
                { name: "BSC (BEP-20)", logoKey: "USDT", address: "0x829f5ddbf2e7df26559a86c61837eb59fc491c13", qr: "https://i.ibb.co.com/ynCSX0Wf/1155.jpg", isPopular: true },
                { name: "TRON (TRC-20)", logoKey: "USDT", address: "TY7NYcRGVyqG3ECNnRb7MqSZnKxDPyhx8L", qr: "https://i.ibb.co.com/VcZfSztd/image.png", isPopular: false }
            ],
            ltc: [{ name: "LTC (Litecoin)", logoKey: "LTC", address: "LRETuh12SFWUmXREKsUfELV1qgPqvcv854", qr: "https://i.ibb.co.com/HpzL6HLj/image.png", isPopular: false }]
        };

        let selectedAsset = "";
        let selectedNetworkIndex = "";
        let currentSheetType = ""; 

        function openDropdownSheet(type) {
            if (type === 'network' && document.getElementById('networkCard').classList.contains('custom-disabled')) return;
            currentSheetType = type;
            document.getElementById('sheetSearchInput').value = ""; 
            document.getElementById('dropdownOverlay').classList.add('show');
            document.getElementById('sheetTitle').innerText = type === 'currency' ? "Select Currency" : ((selectedAsset === 'bKash' || selectedAsset === 'Nagad') ? "Select Account Type" : "Select Network");
            renderSheetOptions();
        }

        function closeDropdownSheet() { document.getElementById('dropdownOverlay').classList.remove('show'); }

        function renderSheetOptions() {
            const container = document.getElementById('sheetOptionsList'); container.innerHTML = "";
            const searchVal = document.getElementById('sheetSearchInput').value.toLowerCase();

            if (currentSheetType === 'currency') {
                const assets = ['bKash', 'Nagad', 'USDT', 'LTC'];
                assets.forEach(asset => {
                    if (asset.toLowerCase().includes(searchVal)) {
                        const item = document.createElement('div'); item.className = "ios-country-item";
                        item.innerHTML = `<span class="item-name">${logos[asset]} ${asset}</span>`;
                        item.onclick = () => selectCurrency(asset); container.appendChild(item);
                    }
                });
            } else {
                const dataKey = selectedAsset.toLowerCase();
                if(walletData[dataKey]) {
                    walletData[dataKey].forEach((net, index) => {
                        if (net.name.toLowerCase().includes(searchVal)) {
                            const item = document.createElement('div'); item.className = "ios-country-item";
                            let popBadge = net.isPopular ? `<span class="popular-badge">Popular</span>` : '';
                            item.innerHTML = `<span class="item-name">${logos[net.logoKey]} ${net.name}</span> ${popBadge}`;
                            item.onclick = () => selectNetwork(index, net.name, net.logoKey); container.appendChild(item);
                        }
                    });
                }
            }
        }

        function filterDropdownOptions() { renderSheetOptions(); }

        function selectCurrency(asset) {
            selectedAsset = asset;
            const trigger = document.getElementById('assetSelected');
            trigger.classList.remove('placeholder');
            document.getElementById('selectedCurrencyText').innerHTML = `
                <span class="item-name">${logos[asset]} ${asset}</span>
            `;
            closeDropdownSheet();
            
            const isFiat = (asset === 'bKash' || asset === 'Nagad');
            document.getElementById('subSelectLabel').innerText = isFiat ? "Account Type" : "Network";
            
            const netCard = document.getElementById('networkCard');
            const netTrigger = document.getElementById('networkSelected');
            netCard.classList.remove('custom-disabled');
            netTrigger.classList.add('placeholder');
            document.getElementById('selectedNetworkText').innerHTML = `
                <span class="item-name" id="networkTextPlaceholder">${isFiat ? "Select Account Type" : "Select Network"}</span>
            `;
            selectedNetworkIndex = ""; 
            
            const btn = document.getElementById('proceedBtn'); 
            btn.setAttribute('disabled','true');
            btn.classList.remove('active');
        }

        function selectNetwork(index, name, logoKey) {
            selectedNetworkIndex = index;
            const trigger = document.getElementById('networkSelected');
            trigger.classList.remove('placeholder');
            document.getElementById('selectedNetworkText').innerHTML = `
                <span class="item-name">${logos[logoKey]} ${name}</span>
            `;
            closeDropdownSheet();
            
            const btn = document.getElementById('proceedBtn'); 
            btn.removeAttribute('disabled');
            btn.classList.add('active');
            document.getElementById('btnText').innerText = "Proceed";
        }

        function startLoadingProcess() {
            if(selectedAsset === "" || selectedNetworkIndex === "") return;
            const btn = document.getElementById('proceedBtn'); 
            const spinner = document.getElementById('btnSpinner'); 
            const btnText = document.getElementById('btnText');
            
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            
            const dataKey = selectedAsset.toLowerCase();
            const netInfo = walletData[dataKey][selectedNetworkIndex];
            const isFiat = (selectedAsset === 'bKash' || selectedAsset === 'Nagad');
            
            document.getElementById('summaryMethod').innerHTML = `
                <img src="${logoUrls[selectedAsset]}" class="crypto-image-logo"> 
                <span style="font-weight:600;">${selectedAsset}</span>
            `;
            
            document.getElementById('addrText').innerText = netInfo.address;
            document.getElementById('summaryTypeValue').innerText = netInfo.name;
            document.getElementById('summaryIdLabel').innerText = isFiat ? "Number" : "Address";
            document.getElementById('summaryTypeLabel').innerText = isFiat ? "Account Type" : "Network";

            const qrSection = document.getElementById('qrToggleContainer');
            if (isFiat) {
                qrSection.style.display = 'none';
            } else {
                qrSection.style.display = 'block';
                document.getElementById('fullscreenQRImage').src = netInfo.qr;
            }
            
            setTimeout(function() {
                document.getElementById('brandHeader').style.display = 'none';
                document.getElementById('selectionArea').style.display = 'none';
                document.getElementById('displayArea').style.display = 'block';
                document.getElementById('displayArea').style.animation = 'stepFade 0.23s ease-out';
                document.getElementById('backArrowBtn').style.display = 'flex';
            }, 1000);
        }

        function handleBackHome() {
            location.reload();
        }

        function openQR() { document.getElementById('qrFullscreenOverlay').style.display = 'flex'; }
        function closeQR() { document.getElementById('qrFullscreenOverlay').style.display = 'none'; }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const copyBtn = document.getElementById('copyBtnEl');
                const icon = document.getElementById('copySvgIcon');
                const notif = document.getElementById('topNotification');
                
                copyBtn.classList.add('copied');
                icon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#ffffff"/>';
                notif.classList.add('show');
                
                setTimeout(function() {
                    notif.classList.remove('show'); copyBtn.classList.remove('copied');
                    icon.innerHTML = '<path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="#8e8e93"/>';
                }, 2000);
            });
        }
    </script>
</body>
</html>
